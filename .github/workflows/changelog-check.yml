name: Changelog Check

on:
  pull_request:
    branches: [main, master]

jobs:
  changelog:
    name: CHANGELOG.md updated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md was modified
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          if git diff --name-only "$BASE" "$HEAD" | grep -q "^CHANGELOG.md$"; then
            echo "CHANGELOG.md updated"
          else
            echo "CHANGELOG.md was not updated in this PR."
            echo "Every PR must include a CHANGELOG.md entry. Add one under [Unreleased]."
            echo "If this is a trivial change, add the skip-changelog label to bypass."
            exit 1
          fi
        shell: bash

      - name: Skip if labelled
        if: contains(github.event.pull_request.labels.*.name, 'skip-changelog')
        run: echo "skip-changelog label present — bypassing check"